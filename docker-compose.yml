# BioSuite Ultra - Docker Compose
# For running BioSuite with optional services

version: '3.8'

services:
  # Main BioSuite CLI
  biosuite:
    build: .
    container_name: biosuite-cli
    volumes:
      - ./data:/data
      - ./output:/output
    command: python run.py
    environment:
      - BIOSUITE_QUIET=false

  # BioSuite REST API
  biosuite-api:
    build: .
    container_name: biosuite-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./output:/output
    command: uvicorn biosuite.api.server:app --host 0.0.0.0 --port 8000

  # Jupyter Notebook with BioSuite
  jupyter:
    build: .
    container_name: biosuite-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/notebooks
      - ./data:/data
    command: >
      jupyter notebook
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --notebook-dir=/notebooks
    environment:
      - JUPYTER_ENABLE_LAB=yes

volumes:
  data:
  output:
  notebooks:
