name: BioSuite Ultra CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov httpx
    
    - name: Run unit tests
      run: |
        pytest tests/ -v --cov=biosuite --cov-report=xml \
          --ignore=tests/test_api.py \
          --ignore=tests/test_gui_all_modules.py \
          --ignore=tests/test_interactive_plots.py \
          --ignore=tests/test_notebook.py \
          --ignore=tests/test_plotting_uncovered.py \
          --ignore=tests/test_databases_and_tools.py \
          -x --timeout=30
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
